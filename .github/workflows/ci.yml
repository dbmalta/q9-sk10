name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    name: PSR-12 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: cs2pr

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install PHP_CodeSniffer
        run: composer require --dev squizlabs/php_codesniffer --no-interaction

      - name: Run PHP_CodeSniffer
        run: vendor/bin/phpcs --standard=PSR12 --extensions=php -n app/ config/ cron/ lang/ scripts/ updater/ index.php

  test:
    name: PHPUnit (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["8.2", "8.3"]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: scoutkeeper_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_mysql, mbstring, intl
          coverage: xdebug

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Wait for MySQL
        run: |
          while ! mysqladmin ping -h 127.0.0.1 --silent; do
            sleep 1
          done

      - name: Seed test database
        run: php tests/seed.php
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: scoutkeeper_test
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: Run PHPUnit
        run: vendor/bin/phpunit
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: scoutkeeper_test
          DB_USERNAME: root
          DB_PASSWORD: root

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: scoutkeeper_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_mysql, mbstring, intl

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress

      - name: Wait for MySQL
        run: |
          while ! mysqladmin ping -h 127.0.0.1 --silent; do
            sleep 1
          done

      - name: Seed test database
        run: php tests/seed.php
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: scoutkeeper_test
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: Start PHP built-in server
        run: php -S 127.0.0.1:8080 -t . &
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: scoutkeeper_test
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: http://127.0.0.1:8080
